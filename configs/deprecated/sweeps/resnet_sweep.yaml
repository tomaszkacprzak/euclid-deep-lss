method: random
metric:
  goal: minimize
  name: loss
name: resnet_sweep
parameters:
  net.dset.training.likelihood_loss.local_batch_size:
    values: [4, 8]
  net.dset.training.delta_loss.local_batch_size:
    values: [16, 32, 64]
  net.optimization.optimizer:
    values: [sgd, adam]
  net.optimization.optimizer_kwargs.learning_rate:
    values: [0.01, 0.001, 0.0001, 0.00001]
  net.optimization.gradient_clipping.clip_by_global_norm:
    values: [null, 1.0, 10.0, 100.0]
  net.network.n_neighbors:
    values: [8, 20]
  net.network.n_residuals:
    values: [3, 5, 7]
  net.network.poly_degree:
    values: [3, 5, 7]
