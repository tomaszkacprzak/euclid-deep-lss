# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: False
    with_clustering: True
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [Om, s8, w0, bg, n_bg]
  eval:
    fiducial:
      params: []
    grid:
      params: [Om, s8, w0, bg, n_bg]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # x Mpc/h transverse comoving scale -> arcmin (to match the l_max in dlss_smoothing>noise)
    theta_fwhm: [15.6, 10.7, 7.9, 6.6]
    # 10 % noise threshold, l_maxs = [786, 1151, 1535, 1535]
    white_noise_sigma: [7.3134e-04, 9.7611e-04, 1.2943e-03, 2.2269e-03]
  clustering:
    # x Mpc/h transverse comoving scale -> arcmin (to match the l_max in dlss_smoothing>noise)
    theta_fwhm: [46.0, 31.5, 24.1, 20.1]
    # 10 % noise threshold, l_maxs = [267, 390, 510, 610]
    white_noise_sigma: [1.6128e+00, 6.6656e-01, 4.6794e-01, 4.3220e-01]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1.0e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False

mutual_info_loss:
  estimator: "variational"
  dim_summary_fac: 2
  # Gaussian mixture model
  kwargs:
    num_components: 4
    num_hidden_layers: 2
    num_hidden_units: 128
    activation: "relu"
    full_covariance: True
