# contains the model specific configuration parameters for training and hyperparameter optimization
name: vit_vanilla

training:
  n_steps: 1000
  output_every: Null
  checkpoint_every: Null
  eval_every: 100

optimization:
  optimizer: adam
  optimizer_kwargs:
    learning_rate: 0.0001
  gradient_clipping:
    clip_by_value: null
    clip_by_norm: null
    clip_by_global_norm: 10.0
  # only affects the delta loss
  noise_schedule_steps: Null

network:
  name: vision_transformer
  # this doesn't affect the model
  n_neighbors: 20
  max_checkpoints: 10
  save_second_to_last_layer: False
  kwargs:
    hidden_dim: 128
    healpix_downsampling: 4
    n_heads: 4
    n_layers: 6
    pos_encoding: True
    layer_norm: True

dset:
  training:
    common:
      is_eval: False
      n_noise: 3
      n_readers: 4
      n_prefetch: null
    # FiducialPipeline
    delta_loss:
      # because of the derivatives, this is multiplied by 1 + 2 * n_params
      local_batch_size: 4
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 128
      is_cached: False
    # GridPipeline
    likelihood_loss:
      local_batch_size: 32
      file_name_shuffle_buffer: 64
      examples_shuffle_buffer: 128
  eval:
    common:
      is_eval: True
      local_batch_size: 32
      n_readers: 4
      n_prefetch: 1
    fiducial:
      n_noise: 1
      is_cached: False
    grid:
      n_noise: 3
