# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: False
    with_clustering: True
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [Om, s8, w0, bg1, bg2, bg3, bg4]
  eval:
    fiducial:
      params: []
    grid:
      params: [Om, s8, w0, bg1, bg2, bg3, bg4]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 8 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [29.5, 20.1, 15.0, 12.6]
    # 10 % noise threshold, l_maxs = [589, 863, 1159, 1382]
    white_noise_sigma: [3.0275e-04, 4.0448e-04, 4.8782e-04, 5.2049e-04]
  clustering:
    # 24 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [97.7, 66.7, 51.1, 42.8]
    # 1 % noise threshold, l_maxs = [178, 261, 340, 406]
    white_noise_sigma: [6.6705e-01, 2.7405e-01, 2.0663e-01, 1.9220e-01]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1.0e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False

mutual_info_loss:
  estimator: "variational"
  dim_summary_fac: 2
  # Gaussian mixture model
  kwargs:
    num_components: 4
    num_hidden_layers: 2
    num_hidden_units: 128
    activation: "relu"
    full_covariance: True
