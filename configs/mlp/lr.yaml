# Network architecture
num_hidden_units: 1024
num_layers: 4
dropout_rate: 0.1
normalization: layer
activation: relu

# Training
n_steps: 500000
batch_size: 1024
learning_rate: 1e-3
clip_by_global_norm: 1.0

# Learning rate schedule
lr_schedule: constant # no cosine decay; learning_rate is held fixed throughout

# Mutual information loss
mutual_info_estimator: variational
full_covariance: true

# Logging / checkpointing
log_every: 100
vali_every: 10000

# XLA compilation (speeds up GPU training step ~20-40%)
xla: true

# Early stopping (patience counts vali evaluations without improvement)
early_stopping:
  patience: 5 # stop after 5 stale vali evals (= 50k steps at vali_every=10k)
  min_delta: 1e-2 # must improve by at least this much
  min_steps: 100000 # never stop before this many training steps
