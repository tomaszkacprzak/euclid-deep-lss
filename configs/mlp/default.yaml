# Network architecture
num_hidden_units: 1024
num_layers: 4
dropout_rate: 0.1
normalization: layer
activation: relu

# Training
n_steps: 1000000
batch_size: 1024
learning_rate: 1e-4
clip_by_global_norm: 1.0

lr_schedule: constant

# Logging / checkpointing
log_every: 100
vali_every: 10000

# XLA compilation (speeds up GPU training step ~20-40%)
xla: true
