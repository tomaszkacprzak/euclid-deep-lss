# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: True
    with_clustering: False
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [ Om, s8, w0, Aia, n_Aia, bta ]
  eval:
    fiducial:
      params: []
    grid:
      params: [ Om, s8, w0, Aia, n_Aia, bta ]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 10 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [ 36.9, 25.2, 18.7, 15.7 ]
    # 1 % noise threshold, l_maxs = [471, 690, 927, 1105]
    white_noise_sigma: [ 3.6488e-4, 4.952e-4, 6.0135e-4, 6.2424e-4 ]
    l_max: [ 471, 690, 927, 1105 ]
  clustering:
    # 28 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [ 113.9, 77.8, 59.6, 49.9 ]
    # 1 % noise threshold, l_maxs = [152, 223, 291, 348]
    white_noise_sigma: [ 8.9314e-1, 4.0024e-1, 3.8566e-1, 4.0293e-1 ]
    l_max: [ 152, 223, 291, 348 ]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False

mutual_info_loss:
  estimator: "variational"
  dim_summary_fac: 2
  # Gaussian mixture model
  kwargs:
    num_components: 4
    num_hidden_layers: 2
    num_hidden_units: 128
    activation: "relu"
    full_covariance: True
  regu:
    z_weight:
      variance: Null
      covariance: Null
      invariance: 1.0
    z_type: vicreg
    z_layer: last
