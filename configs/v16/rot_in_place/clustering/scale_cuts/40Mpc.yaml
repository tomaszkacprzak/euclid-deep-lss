# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: False
    with_clustering: True
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [Om, s8, w0, bg1, bg2, bg3, bg4]
  eval:
    fiducial:
      params: []
    grid:
      params: [Om, s8, w0, bg1, bg2, bg3, bg4]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 16 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [59.0, 40.3, 30.0, 25.1]
    # 1 % noise threshold, l_maxs = [294, 431, 580, 691]
    white_noise_sigma: [5.0799e-4, 7.0184e-4, 8.7089e-4, 9.3145e-4]
    l_max: [294, 431, 580, 691]
  clustering:
    # 40 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [162.8, 111.1, 85.2, 71.3]
    # 1 % noise threshold, l_maxs = [107, 156, 204, 244]
    white_noise_sigma: [1.1067e+0, 5.1717e-1, 5.1635e-1, 5.3947e-1]
    l_max: [107, 156, 204, 244]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False

mutual_info_loss:
  estimator: "variational"
  dim_summary_fac: 2
  # Gaussian mixture model
  kwargs:
    num_components: 4
    num_hidden_layers: 2
    num_hidden_units: 128
    activation: "relu"
    full_covariance: True
  regu:
    z_weight: Null
