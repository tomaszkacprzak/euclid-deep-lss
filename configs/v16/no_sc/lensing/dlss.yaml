# contains the general, non model specific configuration parameters of the analysis
dset:
  common:
    with_lensing: True
    with_clustering: False
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [ Om, s8, w0, Aia, n_Aia, bta ]
  eval:
    fiducial:
      params: []
    grid:
      params: [ Om, s8, w0, Aia, n_Aia, bta ]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 8 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [ 29.5, 20.1, 15.0, 12.6 ]
    # 1 % noise threshold, l_maxs = [589, 863, 1159, 1382]
    white_noise_sigma: [ 3.0275e-4, 4.0448e-4, 4.8782e-4, 5.2049e-4 ]
    l_max: [ 589, 863, 1159, 1382 ]
  clustering:
    # 32 Mpc/h transverse comoving scale -> arcmin
    theta_fwhm: [ 130.2, 88.9, 68.1, 57.0 ]
    # 1 % noise threshold, l_maxs = [133, 195, 255, 305]
    white_noise_sigma: [ 8.5135e-1, 3.4375e-1, 2.5989e-1, 2.4127e-1 ]
    l_max: [ 133, 195, 255, 305 ]

delta_loss:
  # regularization
  force_params_value: 0.0
  force_params_weight: 1.0
  jac_weight: 100.0
  jac_cond_weight: null
  cov_loss: False
  # numerical stability
  use_log_det: True
  tikhonov_regu: False
  eps: 1e-32
  # misc
  img_summary: False

likelihood_loss:
  # regularization
  lambda_tikhonov_init: 20.0
  lambda_tikhonov_decay_steps: 3000
  # misc
  img_summary: False

mutual_info_loss:
  estimator: "variational"
  dim_summary_fac: 2
  # Gaussian mixture model
  kwargs:
    num_components: 4
    num_hidden_layers: 2
    num_hidden_units: 128
    activation: "relu"
    full_covariance: True
  regu:
    z_weight:
      variance: Null
      covariance: Null
      invariance: 1.0
    z_type: vicreg
    z_layer: last
