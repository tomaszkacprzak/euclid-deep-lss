# Network architecture
num_hidden_units: 1024
num_layers: 2
dropout_rate: 0.1
normalization: layer
activation: relu

# Training
n_steps: 500000
batch_size: 1024
learning_rate: 1.0e-4
clip_by_global_norm: 1.0

# Learning rate schedule: cosine decay with optional linear warmup
lr_warmup_steps: 5000  # linear warmup from 0 → learning_rate; set 0 to disable
lr_alpha: 0.0          # floor: final LR = alpha * learning_rate

# Mutual information loss
mutual_info_estimator: variational
full_covariance: false

# Logging / checkpointing
log_every: 100
vali_every: 10000

# XLA compilation (speeds up GPU training step ~20-40%)
xla: true

# Early stopping (patience counts vali evaluations without improvement)
early_stopping:
  patience: 10       # stop after 10 stale vali evals (= 100k steps at vali_every=10k)
  min_delta: 1.0e-4  # must improve by at least this much
  min_steps: 100000  # never stop before this many training steps
