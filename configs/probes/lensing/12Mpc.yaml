dset:
  common:
    with_lensing: True
    with_clustering: False
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [ Om, s8, w0, Aia, n_Aia, bta ]
  eval:
    fiducial:
      params: []
    grid:
      params: [ Om, s8, w0, Aia, n_Aia, bta ]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 12 Mpc/h transverse comoving scale
    theta_fwhm: [44.3, 30.2, 22.5, 18.9]
    white_noise_sigma: [0.00041798, 0.00057273, 0.00071255, 0.00072769]
    l_max: [392, 575, 773, 921]
