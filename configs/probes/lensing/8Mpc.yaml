dset:
  common:
    with_lensing: True
    with_clustering: False
    apply_norm: True
    return_maps: True
    return_cls: False
  training:
    params: [ Om, s8, w0, Aia, n_Aia, bta ]
  eval:
    fiducial:
      params: []
    grid:
      params: [ Om, s8, w0, Aia, n_Aia, bta ]

scale_cuts:
  n_sigma_support: 3
  arcmin: True
  lensing:
    # 8 Mpc/h transverse comoving scale
    theta_fwhm: [29.5, 20.1, 15.0, 12.6]
    white_noise_sigma: [0.00031085, 0.00040528, 0.00049122, 0.0005176]
    l_max: [589, 863, 1159, 1382]
